name: Build and publish apt repository

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout the original build script
        uses: actions/checkout@v4
        with:
          repository: sh4r10/zen-browser-debian
          path: builder

      - name: Checkout existing published repo (gh-pages)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: published
        continue-on-error: true

      - name: Install build requirements
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils curl jq

      - name: Build the .deb package (script, fallback to official release)
        id: build_deb
        run: |
          # --- Try the original build script first ---
          cd builder
          BUILD_SCRIPT=""
          for name in build.sh build debian-package.sh create-deb.sh package.sh; do
            FOUND=$(find . -maxdepth 2 -type f -name "$name" | head -n 1)
            [ -n "$FOUND" ] && { BUILD_SCRIPT="$FOUND"; break; }
          done
          [ -z "$BUILD_SCRIPT" ] && BUILD_SCRIPT=$(find . -maxdepth 2 -type f -name "*.sh" -executable | head -n 1)

          if [ -n "$BUILD_SCRIPT" ]; then
            echo "Running build script: $BUILD_SCRIPT"
            chmod +x "$BUILD_SCRIPT"
            ./"$BUILD_SCRIPT"
            # Move any .deb to workspace root
            find . -name "*.deb" -exec mv {} "$GITHUB_WORKSPACE" \; 2>/dev/null || true
          fi

          # --- Check if a .deb was produced ---
          if ls "$GITHUB_WORKSPACE"/*.deb >/dev/null 2>&1; then
            echo "deb_built=true" >> $GITHUB_OUTPUT
            echo "=== .deb built via script ==="
            ls -la "$GITHUB_WORKSPACE"/*.deb
          else
            echo "deb_built=false" >> $GITHUB_OUTPUT
            echo "No .deb from script – falling back to official release"
            # Fallback: download the official Zen Browser .deb from GitHub
            RELEASE_JSON=$(curl -s https://api.github.com/repos/zen-browser/desktop/releases/latest)
            VERSION=$(echo "$RELEASE_JSON" | jq -r .tag_name)
            DEB_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".deb")) | .browser_download_url' | head -n 1)
            if [ -z "$DEB_URL" ]; then
              echo "::error::No .deb asset found in official release"
              exit 1
            fi
            echo "Downloading: $DEB_URL"
            curl -L -o "$GITHUB_WORKSPACE/zen-browser_${VERSION}_amd64.deb" "$DEB_URL"
            echo "=== .deb downloaded ==="
            ls -la "$GITHUB_WORKSPACE"/*.deb
          fi

      - name: Check if a new version exists
        id: check
        run: |
          deb_file=$(ls -1 "$GITHUB_WORKSPACE"/*.deb | head -n 1 | xargs basename)
          if [ -f "published/pool/main/z/zen-browser/$deb_file" ]; then
            echo "new_version=false" >> $GITHUB_OUTPUT
          else
            echo "new_version=true" >> $GITHUB_OUTPUT
          fi
          echo "deb_file=$deb_file" >> $GITHUB_OUTPUT

      - name: Prepare repository structure (new version only)
        if: steps.check.outputs.new_version == 'true'
        run: |
          mkdir -p repo/pool/main/z/zen-browser
          mkdir -p repo/dists/stable/main/binary-amd64

          # Copy existing pool
          if [ -d published/pool ] && ls published/pool/* >/dev/null 2>&1; then
            cp -r published/pool/* repo/pool/
          fi

          # Copy the new .deb
          cp "$GITHUB_WORKSPACE"/*.deb repo/pool/main/z/zen-browser/

          echo "=== Pool contents ==="
          ls -la repo/pool/main/z/zen-browser/

          # Keep only the 5 most recent versions
          cd repo/pool/main/z/zen-browser
          for deb in *.deb; do
            version=$(echo "$deb" | sed -n 's/^zen-browser_\(.*\)_amd64\.deb$/\1/p')
            [ -n "$version" ] && echo "$version $deb"
          done | sort -Vr | head -n 5 | awk '{print $2}' > /tmp/keep.list

          for deb in *.deb; do
            if ! grep -qF "$deb" /tmp/keep.list; then
              echo "Removing old version: $deb"
              rm "$deb"
            fi
          done

      - name: Generate metadata (new version only)
        if: steps.check.outputs.new_version == 'true'
        run: |
          cd repo

          dpkg-scanpackages --arch amd64 pool/main > dists/stable/main/binary-amd64/Packages
          gzip -9c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Zen Browser Unofficial" \
            -o APT::FTPArchive::Release::Label="Zen Browser" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="Unofficial Debian packages for Zen Browser" \
            release dists/stable > dists/stable/Release

          echo "=== Generated Packages (first 20 lines) ==="
          head -20 dists/stable/main/binary-amd64/Packages

      - name: Sign Release file (InRelease) and export public key
        if: steps.check.outputs.new_version == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd repo

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $2}' | cut -d'/' -f2)

          rm -f dists/stable/Release.gpg dists/stable/Release.asc

          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --clearsign --armor --output dists/stable/InRelease dists/stable/Release

          gpg --export --armor "$KEY_ID" > KEY.gpg

          gpg --verify dists/stable/InRelease

      - name: Ensure .nojekyll exists
        run: touch repo/.nojekyll

      - name: Deploy to GitHub Pages (new version only)
        if: steps.check.outputs.new_version == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
          force_orphan: true
