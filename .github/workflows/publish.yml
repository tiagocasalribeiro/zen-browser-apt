name: Build and publish apt repository

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout the original build script
        uses: actions/checkout@v4
        with:
          repository: sh4r10/zen-browser-debian
          path: builder

      - name: Install build requirements
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils

      - name: Build the .deb package
        run: |
          cd builder
          BUILD_SCRIPT=""
          for name in build.sh build debian-package.sh create-deb.sh package.sh; do
            FOUND=$(find . -maxdepth 2 -type f -name "$name" | head -n 1)
            [ -n "$FOUND" ] && { BUILD_SCRIPT="$FOUND"; break; }
          done
          [ -z "$BUILD_SCRIPT" ] && BUILD_SCRIPT=$(find . -maxdepth 2 -type f -name "*.sh" -executable | head -n 1)

          if [ -z "$BUILD_SCRIPT" ]; then
            echo "::error::No build script found."
            exit 1
          fi

          echo "Using: $BUILD_SCRIPT"
          chmod +x "$BUILD_SCRIPT"
          ./"$BUILD_SCRIPT"

          # Move .deb to workspace root
          find . -name "*.deb" -exec mv {} "$GITHUB_WORKSPACE"/ \;
          cd "$GITHUB_WORKSPACE"

          echo "=== .deb files ==="
          find . -name "*.deb" -exec ls -la {} \;

          if [ "$(find . -name "*.deb" | wc -l)" -eq 0 ]; then
            echo "::error::No .deb created."
            exit 1
          fi

      - name: Check if new version is needed
        id: check
        run: |
          deb_file=$(ls -1 ./*.deb | head -n 1 | xargs basename)
          # Check if file exists on the existing gh-pages branch (if any)
          if git ls-remote --exit-code --heads origin gh-pages; then
            REMOTE_POOL_FILE=$(curl -s -o /dev/null -w "%{http_code}" "https://tiagocasalribeiro.github.io/zen-browser-apt/pool/main/z/zen-browser/$deb_file")
            if [ "$REMOTE_POOL_FILE" = "200" ]; then
              echo "new_version=false" >> $GITHUB_OUTPUT
            else
              echo "new_version=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "new_version=true" >> $GITHUB_OUTPUT
          fi
          echo "deb_file=$deb_file" >> $GITHUB_OUTPUT

      - name: Prepare gh-pages working directory
        if: steps.check.outputs.new_version == 'true'
        run: |
          mkdir deploy
          cd deploy
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch origin gh-pages || true

          if git ls-remote --exit-code --heads origin gh-pages; then
            git checkout gh-pages
            find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} \;
          else
            git checkout --orphan gh-pages
            rm -rf *
          fi

      - name: Build repository structure in deploy folder
        if: steps.check.outputs.new_version == 'true'
        run: |
          cd deploy

          # Create directory structure
          mkdir -p pool/main/z/zen-browser
          mkdir -p dists/stable/main/binary-amd64

          # Copy the .deb from workspace root into pool
          cp "$GITHUB_WORKSPACE"/*.deb pool/main/z/zen-browser/

          # Keep only 5 most recent versions
          cd pool/main/z/zen-browser
          for deb in *.deb; do
            version=$(dpkg-deb -f "$deb" Version 2>/dev/null || echo "0")
            echo "$version $deb"
          done | sort -Vr | head -n 5 | awk '{print $2}' > /tmp/keep.list

          for deb in *.deb; do
            if ! grep -qF "$deb" /tmp/keep.list; then
              echo "Removing old: $deb"
              rm "$deb"
            fi
          done
          cd "$GITHUB_WORKSPACE/deploy"

      - name: Generate metadata
        if: steps.check.outputs.new_version == 'true'
        run: |
          cd deploy

          dpkg-scanpackages --arch amd64 pool/main > dists/stable/main/binary-amd64/Packages
          gzip -9c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Zen Browser Unofficial" \
            -o APT::FTPArchive::Release::Label="Zen Browser" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="Unofficial Debian packages for Zen Browser" \
            release dists/stable > dists/stable/Release

          # Enforce non-empty Packages
          if [ ! -s dists/stable/main/binary-amd64/Packages ]; then
            echo "::error::Packages file is empty!"
            exit 1
          fi

          echo "=== Packages preview ==="
          head -20 dists/stable/main/binary-amd64/Packages

      - name: Sign Release and export public key
        if: steps.check.outputs.new_version == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd deploy

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $2}' | cut -d'/' -f2)

          rm -f dists/stable/Release.gpg dists/stable/Release.asc

          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
            --clearsign --armor --output dists/stable/InRelease dists/stable/Release

          gpg --export --armor "$KEY_ID" > KEY.gpg

          gpg --verify dists/stable/InRelease

      - name: Push to gh-pages
        if: steps.check.outputs.new_version == 'true'
        run: |
          cd deploy
          touch .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Update apt repository [skip ci]" || echo "No changes to commit"
          git push origin gh-pages --force

      - name: Verify live URL
        if: steps.check.outputs.new_version == 'true'
        run: |
          DEB_FILE="${{ steps.check.outputs.deb_file }}"
          LIVE_URL="https://tiagocasalribeiro.github.io/zen-browser-apt/pool/main/z/zen-browser/${DEB_FILE}"
          PACKAGES_URL="https://tiagocasalribeiro.github.io/zen-browser-apt/dists/stable/main/binary-amd64/Packages"
          echo "Waiting 30s for GitHub Pages..."
          sleep 30

          echo "Checking .deb file..."
          HTTP_DEB=$(curl -s -o /dev/null -w "%{http_code}" "$LIVE_URL")
          echo "  Status: $HTTP_DEB"

          echo "Checking Packages file..."
          HTTP_PKG=$(curl -s -o /dev/null -w "%{http_code}" "$PACKAGES_URL")
          echo "  Status: $HTTP_PKG"
          PACKAGES_SIZE=$(curl -s "$PACKAGES_URL" | wc -c)
          echo "  Size: ${PACKAGES_SIZE} bytes"

          if [ "$HTTP_DEB" != "200" ] || [ "$HTTP_PKG" != "200" ] || [ "$PACKAGES_SIZE" -eq 0 ]; then
            echo "::warning::Deployment may not be fully propagated yet. Check manually."
          else
            echo "✅ Repository is live and Packages file is populated."
          fi
